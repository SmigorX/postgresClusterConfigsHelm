name: Release Helm Chart

on:
    push:
        branches:
            - master
        paths:
            - "cluster/**" # Uruchom tylko gdy zmienia się coś w folderze z chartem

jobs:
    release:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write # Wymagane do zapisu w GHCR

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Install Helm
              uses: azure/setup-helm@v4
              with:
                  version: "latest"

            - name: Log in to GitHub Container Registry
              run: |
                  echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

            - name: Package and Push Helm Chart
              run: |
                  # 1. Pobieramy wersję z Chart.yaml
                  CHART_NAME=$(grep '^name:' charts/postgres/Chart.yaml | awk '{print $2}')
                  CHART_VERSION=$(grep '^version:' charts/postgres/Chart.yaml | awk '{print $2}')

                  echo "Packaging chart $CHART_NAME version $CHART_VERSION"

                  # 2. Pakujemy chart (tworzy plik .tgz)
                  helm package charts/postgres

                  # 3. Wypychamy do GHCR (jako OCI artifact)
                  helm push ${CHART_NAME}-${CHART_VERSION}.tgz oci://ghcr.io/${{ github.repository_owner }}/charts

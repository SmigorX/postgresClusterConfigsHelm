{{- if .Values.vaultSecrets }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-sa
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
---
{{- if not .Values.vaultSecrets.existingConnection }}
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultConnection
metadata:
  name: {{ .Release.Name }}-connection
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
spec:
  address: {{ .Values.vaultSecrets.address | default "https://api.vault.internal.wmsdev.pl:8200" | quote }}
  skipTLSVerify: {{ .Values.vaultSecrets.skipTLSVerify | default false }}
  {{- if .Values.vaultSecrets.caCertSecretRef }}
  caCertSecretRef: {{ .Values.vaultSecrets.caCertSecretRef }}
  {{- end }}
{{- end }}
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: {{ .Release.Name }}-auth
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  vaultConnectionRef: {{ .Values.vaultSecrets.existingConnection | default (printf "%s-connection" .Release.Name) | quote }}
  method: {{ .Values.vaultSecrets.authMethod | default "kubernetes" }}
  mount: {{ .Values.vaultSecrets.authMount | default "kubernetes" }}
  kubernetes:
    role: {{ .Values.vaultSecrets.role | default .Release.Name }}
    serviceAccount: {{ .Release.Name }}-sa
---
{{- range $name, $config := .Values.vaultSecrets }}
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: {{ $name }}
  namespace: {{ $.Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  type: {{ $config.type | default "kv-v2" }}
  mount: {{ $config.mount | default "secret" }}
  path: {{ $config.path | required "path is required for VaultStaticSecret" | quote }}
  refreshAfter: {{ $config.refreshAfter | default "5m" }}
  vaultAuthRef: {{ $.Release.Name }}-auth
  destination:
    name: {{ $name }}
    create: {{ if hasKey ($config.destination | default dict) "create" }}{{ $config.destination.create }}{{ else }}true{{ end }}
---
{{- end }}
{{- end }}

{{- if .Values.externalAccess.enabled }}
{{- range .Values.externalAccess.endpoints }}
apiVersion: v1
kind: Service
metadata:
    name: {{ .backendService }}-external
    namespace: {{ $.Values.cluster.namespace }}
    annotations:
        io.cilium/lb-ipam-ips: {{ .ip | quote }}
        argocd.argoproj.io/sync-wave: "1"
spec:
    type: LoadBalancer
    ports:
        - name: postgres
          port: {{ .port }}
          targetPort: 5432
          protocol: TCP
    selector:
        cnpg.io/cluster: {{ $.Values.cluster.name }}
        role: {{ .role }}
---
{{- end }}
{{- end }}

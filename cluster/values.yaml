# configuration for CloudNativePG cluster
cluster:
    name: postgres-cluster
    namespace: postgres-system
    description: "High-availability PostgreSQL cluster"

    image: ghcr.io/cloudnative-pg/postgresql:15.4

    instances: 3
    # PodDisruptionBudget
    minAvailable: 1

    resources:
        requests:
            memory: "1Gi"
            cpu: "500m"
        limits:
            memory: "2Gi"
            cpu: "1"

    storage:
        storageClass: standard
        size: 10Gi

    monitoring: true
    enableExternalSuperuserAccess: false

# Backup configuration (S3/Object Storage)
backup:
    enabled: true
    destinationPath: s3://my-postgres-backups/main-cluster
    endpointURL: https://s3.amazonaws.com
    retentionPolicy: "30d"
    schedule: "0 0 0 * * *"
    backupCredentialsSecret:
        source: vault # Options: vault, create
        createSecret:
            name: backup-creds
            ACCESS_KEY_ID: "example-key"
            ACCESS_SECRET_KEY: "example-secret"
        pullSecretFromVault:
            name: backup-creds
            path: secret/data/postgres/backup

# External access via LoadBalancer for Cilium
externalAccess:
    enabled: true
    endpoints:
        - name: primary
          port: 5432
          ip: 192.168.1.100
          role: primary
        - name: replica
          port: 5432
          ip: 192.168.1.101
          role: replica

# Database initialization and recovery
database:
    strategy: initdb # Options: initdb, recovery
    recovery:
        sourceName: s3-backup-src
        destinationPath: s3://my-postgres-backups/main-cluster
        endpointURL: https://s3.amazonaws.com
        bootstrapS3CredentialsSecret:
            source: vault
            createSecret:
                name: bootstrap-creds
                ACCESS_KEY_ID: "example-key"
                ACCESS_SECRET_KEY: "example-secret"
            pullSecretFromVault:
                name: bootstrap-creds
                path: secret/data/postgres/bootstrap

    initdb:
        databases:
            - name: app_db
              owner: app_user
              encoding: UTF8
              locale: en_US.UTF-8
            - name: analytics_db
              owner: app_user

        postInitScript:
            enabled: false
            script: |
                # CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
                #CREATE EXTENSION IF NOT EXISTS "pg_stat_statements";

# Users and Access Control
users:
    superuserSecret:
        source: vault
        createSecret:
            name: postgres-superuser
            username: postgres
            password: "change-me-securely"
        pullSecretFromVault:
            name: postgres-superuser
            path: secret/data/postgres/superuser

    roles:
        - name: app_user
          login: true
          superuser: false
          credentialsSecret:
              source: vault
              createSecret:
                  name: app-user-creds
                  username: app_user
                  password: "change-me-securely"
              pullSecretFromVault:
                  name: app-user-creds
                  path: secret/data/postgres/app_user
